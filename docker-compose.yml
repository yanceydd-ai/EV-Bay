services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-evbay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-evbay}
      POSTGRES_DB: ${POSTGRES_DB:-evbay}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evbay} -d ${POSTGRES_DB:-evbay}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://evbay:evbay@postgres:5432/evbay}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  detector:
    build:
      context: .
      dockerfile: services/detector/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://web:3000
    depends_on:
      web:
        condition: service_started

volumes:
  postgres-data:

